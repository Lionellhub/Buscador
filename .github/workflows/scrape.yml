name: Actualizar Lista de Radios PR

on:
  schedule:
    # Ejecutar cada 4 horas
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Obtener código del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt

      - name: Ejecutar el scraper
        run: python scraper.py
        env:
          GITHUB_ACTIONS: true

      - name: Verificar si el archivo existe
        run: |
          if [ -f "radios_pr.m3u" ]; then
            echo "✅ Archivo existe"
            wc -l radios_pr.m3u
          else
            echo "⚠️ No se generó archivo nuevo, se mantiene el anterior"
          fi

      - name: Commit solo si hay cambios
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🔄 Actualización automática de radios [skip ci]"
          file_pattern: radios_pr.m3u
          commit_user_name: GitHub Actions Bot
          commit_user_email: actions@github.com
